server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: cualquier ruta que no sea un archivo real
    # cae a index.html para que Vue Router tome el control
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agresivo para assets con hash (generados por Vite)
    # El nombre del archivo cambia con cada build, por eso es seguro cachear 1 año
    location ~* \.(js|css|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache moderado para imágenes y audio del juego
    location ~* \.(png|jpg|jpeg|gif|svg|ico|mp3|ogg|wav)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Nunca cachear el index.html (necesita estar siempre actualizado)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
