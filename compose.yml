services:
  mongo:
    image: mongo:7
    container_name: shirokuro-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
    container_name: shirokuro-backend
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      PORT: 3000
      NODE_ENV: development
      MONGODB_URI: mongodb://mongo:27017/shirokuro
      JWT_SECRET: shirokuro_desarrollo_cambiar_en_produccion
      FRONTEND_URL: http://localhost:8080
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
    container_name: shirokuro-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongo-data: